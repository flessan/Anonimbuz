<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO & Meta Tags Dasar -->

    content="Anonimbuz adalah platform media sosial anonim khusus teks untuk membagikan pemikiran, keluh kesah, dan cerita jujur tanpa takut dihakimi." />
  <meta name="keywords" content="media sosial anonim, anonimbuz, anomia, curhat anonim, wadah teks anonim" />

  <!-- Open Graph (Facebook / WhatsApp / Discord Preview) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://anon.thio.qzz.io" />
  <meta property="og:title" content="Anonimbuz — Bisikan Suaramu Tanpa Identitas" />
  <meta property="og:description"
    content="Bagikan keluh kesah dan cerita jujurmu secara anonim tanpa identitas di Anonimbuz." />
  <meta property="og:image" content="/og-image.png" /> <!-- Buat gambar 1200x630px di folder public -->

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Anonimbuz — Bisikan Suaramu Tanpa Identitas" />
  <meta name="twitter:description"
    content="Bagikan keluh kesah dan cerita jujurmu secara anonim tanpa identitas di Anonimbuz." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Favicon Tradisional & Modern -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Optimasi Apple PWA (iOS Mobile App Feel) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Anonimbuz" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" /> <!-- Gambar 180x180px di folder public -->

  <!-- Web Fonts Preconnect & Swap (Mempercepat Loading Font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS Loading Spinner Animasi (Mencegah Layar Blank Putih Saat Awal Memuat Script) -->
  <style>
    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #0E0E10;
      z-index: 9999;
      font-family: 'Inter', sans-serif;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(59, 59, 59, 0.1);
      border-radius: 50%;
      border-top-color: #e8e8e8;
      /* Menggunakan warna ungu aksen Anonimbuz */
      animation: spin 1s ease-in-out infinite;
    }

    .loader-text {
      color: #ffffff;
      margin-top: 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <!-- Tampilan Loader Awal: Otomatis hilang saat ReactJS selesai memuat -->
  <div id="initial-loader" class="initial-loader">
    <div class="spinner"></div>
    <div class="loader-text">MEMUAT ANONIMBUZ...</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then((reg) => {
          console.log('[SW] Registered:', reg.scope);
        }).catch((err) => {
          console.warn('[SW] Registration failed:', err);
        });
      });
    }
  </script>

  <!-- Script Penghapus Tampilan Loader Ketika React Sudah Siap Menempel -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        // Beri sedikit delay halus agar transisi tidak patah
        setTimeout(() => {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }, 200);
      }
    });
  </script>
</body>

</html>
